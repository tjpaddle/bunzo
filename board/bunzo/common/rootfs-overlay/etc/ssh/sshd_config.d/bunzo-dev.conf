# DEV-ONLY override. The bunzo image ships with an empty-password root
# account until the onboarding flow provisions a real user. Allowing
# root-with-empty-password over SSH keeps the inner-loop cheap while M3/M4
# are being built. Remove (or replace with key-only auth) before any bunzo
# image is shipped to a user.
PermitRootLogin yes
PermitEmptyPasswords yes
