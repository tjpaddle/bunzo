name = "read-local-file"
version = "0.0.1"
description = "Read a whitelisted local file on the bunzo device and return its contents."
entry = "run"

# JSON Schema describing the skill's input, passed verbatim to the LLM as the
# tool's parameter schema.
[parameters]
type = "object"
required = ["path"]
additionalProperties = false

[parameters.properties.path]
type = "string"
description = "Path to the file to read. Must be inside a whitelisted directory or an exact whitelisted file path."

# Capability declarations. Anything not listed here is denied by the host.
# Entries ending in `/` are treated as directory prefixes; exact paths require
# an exact match.
[capabilities]
fs_read = [
    "/etc/os-release",
    "/etc/motd",
    "/etc/hostname",
    "/proc/meminfo",
    "/proc/uptime",
    "/proc/loadavg",
    "/var/lib/bunzo/",
]
